<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <link th:href="@{/css/style.css}" rel="styleSheet">
    <title>TOP</title>
</head>
<body>
    <div class="header-contents">
        <h1>TODO</h1>
    </div>
    <div>
        <p th:text="'今日の日付：' + ${today}"></p>
    </div>
    <div class="add-button">
        <a href="/new">
            <button type="submit" >新規タスク</button>
        </a>
    </div>
    <form>
        <label>期限</label>
        <input type="date" name="startDate" />～
        <input type="date" name="endDate" />
            ステータス
        <select>
            <option value=""></option>
            <option th:each="entry : ${map.entrySet()}"
                    th:value="${entry.key}"
                    th:text="${entry.value}">
            </option>
        </select>
        タスク内容<input type="text" name="task" />
        <button type="submit">絞込</button>
    </form>
    <table>
        <thead>
        <tr>
            <th>タスク内容</th>
            <th>ステータス</th>
            <th></th> <!-- 変更ボタン用 -->
            <th>タスク期限</th>
            <th></th> <!-- 編集・削除ボタン用 -->
        </tr>
        </thead>

        <tbody>
        <tr th:each="task : ${tasks}">
            <!-- タスク内容 -->
            <td th:text="${task.content}"></td>

            <!-- ステータス -->
            <td>
                <select>
                    <option th:each="entry : ${map.entrySet()}"
                            th:value="${entry.key}"
                            th:text="${entry.value}"
                            th:selected="${task.status} == ${entry.key}">
                    </option>
                </select>
            </td>

            <!-- 変更ボタン -->
            <td>
                <button>
                    変更
                </button>
            </td>

            <!-- タスク期限 -->
            <td th:text="${task.limit_date}"></td>

            <!-- 編集・削除 -->
            <td>
                <button>
                    編集
                </button>
                <button>
                    削除
                </button>
            </td>
        </tr>
        </tbody>
    </table>

</body>
</html>
