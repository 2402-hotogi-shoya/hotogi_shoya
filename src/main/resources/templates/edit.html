<!DOCTYPE html>
<html xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <link th:href="@{/css/style.css}" rel="styleSheet">
    <title>タスク編集</title>
</head>
<body>
<div class="header-contents">
    <h2>タスク編集</h2>
</div>
<div class="main-contents">
    <form th:method="post" th:action="@{/update/{id}(id=${taskModel.id})}" th:object="${taskModel}">
        <div th:if="${#fields.hasErrors('content')}" th:errors="*{content}" style="color:red"></div>
        <div th:if="${#fields.hasErrors('limitDate')}" th:errors="*{limitDate}" style="color:red"></div>

        <label>タスク内容</label>
        <div class="task-area">
            <textarea class="task-box" th:field="*{content}" size="20" maxlength="200"></textarea><br/>
        </div><br>

        <label>タスク期限</label>
        <div class="limit-date">
            <input type="date" th:field="*{limitDate}" />
        </div><br>
        <input type="submit" value="編集"/>
    </form>
</div><br>
<div>
    <a href="/">
        戻る
    </a>
</div>
</body>
</html>
